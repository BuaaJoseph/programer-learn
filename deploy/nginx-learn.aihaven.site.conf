#     listen 80;
#     server_name learn.aihaven.site;
#     root /var/www/learn;
#     index index.html;
#     location / { try_files $uri $uri/ /index.html; }
#     location /assets/ { expires 30d; add_header Cache-Control "public, immutable"; }
# }
