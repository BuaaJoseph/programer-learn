# 编程学习站 nginx 配置
# 放到服务器：/etc/nginx/conf.d/learn.aihaven.site.conf
#
# 设计：与你现有「80 反代 8080」的模式一致——
#   1) 站点静态文件由 nginx 在「单独端口 8081」上提供；
#   2) 域名 learn.aihaven.site 在 80 端口反向代理到 8081。
# 这样不会动到你现有的 80 默认站点与 8080 服务。

# (1) 单独端口：直接服务打包好的静态文件（SPA）
server {
    listen 8081;
    server_name _;

    root /var/www/learn;
    index index.html;

    # 前端路由是 BrowserRouter，刷新非根路径时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API（登录鉴权 + 面试模拟）反代到 Node 服务（默认 8787）。
    # 注意：面试官对话是 SSE 流式，必须关闭缓冲，否则前端收不到逐字输出。
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 带 hash 的静态资源长缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/learn.access.log;
    error_log  /var/log/nginx/learn.error.log;
}

# (2) 域名在 80 端口：放行 ACME 验证；其余反代到 8081。
#     启用 HTTPS 后，把下面的「重定向到 https」那一行取消注释即可强制跳转。
server {
    listen 80;
    server_name learn.aihaven.site;

    # certbot --webroot 验证用（申请/续期证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/learn;
    }

    location / {
        # 启用 HTTPS 后取消下一行注释，把 http 全部跳到 https（麦克风/录音要求 https）：
        # return 301 https://$host$request_uri;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# (3) HTTPS（443）—— 麦克风/录音（getUserMedia）只在 https 或 localhost 下可用，
#     线上要用「语音作答」就必须开 HTTPS。
#
#  启用步骤（服务器上，需 root；DNS 已指向本机、80 端口可达）：
#    最简单：  sudo certbot --nginx -d learn.aihaven.site
#             （certbot 会自动申请证书并改写本配置，通常无需手动改下面这段）
#    或手动：  1) sudo certbot certonly --webroot -w /var/www/learn -d learn.aihaven.site
#             2) 取消下面整段 443 server 的注释、并取消上面那行 return 301 的注释
#             3) sudo nginx -t && sudo nginx -s reload
