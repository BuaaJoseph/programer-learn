#     server_name learn.aihaven.site;
#
#     ssl_certificate     /etc/letsencrypt/live/learn.aihaven.site/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/learn.aihaven.site/privkey.pem;
#     # 以下两项由 certbot 安装，存在则启用更安全的 TLS 参数：
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
